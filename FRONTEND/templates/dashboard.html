{% extends "base.html" %}
{% block title %}Dashboard — SecureBank{% endblock %}

{% block content %}
<h2 class="mb-4">Welcome, {{ customer_name }}!</h2>

<!-- Account summary card -->
<div class="row justify-content-center mb-4">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header">
        <h5 class="mb-0">Account Summary</h5>
      </div>
      <div class="card-body text-center py-4">
        <p class="text-muted mb-1">Current Balance</p>
        <h2 class="display-5 fw-bold text-success">
          £{{ "%.2f"|format(balance) }}
        </h2>
      </div>
    </div>
  </div>
</div>

<!-- Action buttons -->
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="d-flex gap-3 justify-content-center">
      <a href="{{ url_for('main.deposit') }}" class="btn btn-primary btn-lg flex-fill">
        ↑ Deposit Funds
      </a>
      <a href="{{ url_for('main.withdraw') }}" class="btn btn-outline-primary btn-lg flex-fill">
        ↓ Withdraw Funds
      </a>
    </div>
  </div>
</div>
{% endblock %}
