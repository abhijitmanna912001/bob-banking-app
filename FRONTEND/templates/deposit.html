{% extends "base.html" %}
{% block title %}Deposit Funds — SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-sm-8">
    <h3 class="mb-4">Deposit Funds</h3>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('main.deposit') }}" novalidate>
          <div class="mb-3">
            <label for="amount" class="form-label">Amount (£)</label>
            <input
              type="number"
              id="amount"
              name="amount"
              class="form-control"
              placeholder="0.00"
              min="0.01"
              step="0.01"
            />
            <div class="form-text">Enter the amount you wish to deposit.</div>
          </div>
          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary btn-lg">Deposit</button>
          </div>
        </form>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary w-100">
          ← Back to Dashboard
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
